<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #1a1f3a 0%, #0a0e27 100%);
        }
        
        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            max-width: 300px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        #controls h2 {
            color: #6495ff;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .agent-card {
            background: rgba(40, 45, 70, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s;
        }
        
        .agent-card:hover {
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(50, 55, 80, 0.7);
        }
        
        .agent-name {
            font-weight: bold;
            color: #ff9d6e;
            margin-bottom: 4px;
        }
        
        .agent-status {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #spawn-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #64ffda 0%, #48bfe3 100%);
            border: none;
            color: #0a0e27;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(100, 255, 218, 0.4);
            transition: all 0.2s;
        }
        
        #spawn-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(100, 255, 218, 0.6);
        }
        
        #spawn-button:active {
            transform: translateY(0);
        }
        
        #event-log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            max-width: 400px;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        #event-log h3 {
            color: #6495ff;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .event {
            font-size: 12px;
            padding: 8px;
            margin-bottom: 6px;
            background: rgba(40, 45, 70, 0.4);
            border-radius: 4px;
            border-left: 3px solid #6495ff;
        }
        
        .event-time {
            color: #888;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <button id="spawn-button" onclick="simulation.spawnAgent()">+ Spawn Agent</button>
    
    <div id="controls">
        <h2>🌍 Simulation Control</h2>
        <div class="agent-list" id="agentList"></div>
        <button onclick="simulation.triggerEvent()">⚡ Trigger Event</button>
        <button onclick="simulation.togglePause()">⏯ Pause/Resume</button>
    </div>
    
    <div id="event-log">
        <h3>📜 Event Log</h3>
        <div id="events"></div>
    </div>
    
    <script src="simulation.js"></script>
</body>
</html>
